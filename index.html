<body>
  <script>
    const PASSWORD = "0509";
    function checkPassword() {
      const userInput = prompt("🔐 パスコードを入力してください:");
      if (userInput !== PASSWORD) {
        alert("❌ パスワードが違います");
        location.reload();
      } else {
        alert("✅ ログイン成功");
      }
    }
    window.onload = checkPassword;
  </script>

  <h1>BIZ.PICK.CL</h1>

  <div>
    <input id="userName" type="text" placeholder="ユーザー名を入力（例：A01）">
    <button id="btnStart">Start</button>
  </div>

  <div id="groupSection" class="hidden">
    <h3>番号入力 & グループ化</h3>
    <input id="manualNum" type="text" placeholder="7桁番号を入力">
    <button id="btnAddManual">追加</button>

    <div style="display:flex;gap:8px;margin-top:8px">
      <select id="groupSelect"></select>
      <input id="newGroupName" type="text" placeholder="New group name">
      <button id="btnAddGroup">Add</button>
    </div>

    <div id="listArea" style="margin-top:12px;max-height:200px;overflow:auto;border:1px solid #ccc;padding:8px"></div>
    <button id="btnBulkGroup">選択を一括でグループ化</button>
    <button id="btnAssignGroups">グループを確定して保存</button>
  </div>

  <script>
    const PREFIX = 'BIZPICK_CL_v3_';
    let currentUser = null;
    let store = { groups: {} };
    let itemsBuffer = [];

    const userNameInput = document.getElementById('userName');
    const btnStart = document.getElementById('btnStart');
    const groupSection = document.getElementById('groupSection');
    const manualNum = document.getElementById('manualNum');
    const btnAddManual = document.getElementById('btnAddManual');
    const groupSelect = document.getElementById('groupSelect');
    const newGroupName = document.getElementById('newGroupName');
    const btnAddGroup = document.getElementById('btnAddGroup');
    const listArea = document.getElementById('listArea');
    const btnBulkGroup = document.getElementById('btnBulkGroup');
    const btnAssignGroups = document.getElementById('btnAssignGroups');

    function saveUserStore() {
      if(!currentUser) return;
      localStorage.setItem(PREFIX + currentUser, JSON.stringify(store));
    }

    function loadUserStore(user) {
      const raw = localStorage.getItem(PREFIX + user);
      if(raw) store = JSON.parse(raw);
      else store = { groups: {} };
    }

    function refreshGroupSelect() {
      groupSelect.innerHTML = '';
      Object.keys(store.groups).forEach(g => {
        const opt = document.createElement('option');
        opt.value = g; opt.textContent = g;
        groupSelect.appendChild(opt);
      });
    }

    function renderListArea() {
      listArea.innerHTML = '';
      itemsBuffer.forEach((it, idx) => {
        const div = document.createElement('div');
        div.style.display='flex'; div.style.alignItems='center'; div.style.gap='8px';
        const cb = document.createElement('input'); cb.type='checkbox';
        cb.onchange = e => it.selected = e.target.checked;
        const num = document.createElement('div'); num.textContent = it.num;
        num.style.cursor='pointer';
        div.appendChild(cb); div.appendChild(num);
        listArea.appendChild(div);
      });
    }

    btnStart.onclick = () => {
      const u = (userNameInput.value||'').trim();
      if(!u) { alert('Enter user name'); return; }
      currentUser = u; loadUserStore(currentUser);
      if(Object.keys(store.groups).length === 0) store.groups['Default'] = { items: [] };
      refreshGroupSelect();
      groupSection.classList.remove('hidden');
    };

    btnAddManual.onclick = () => {
      const v = (manualNum.value||'').trim();
      if(!/^\d{7}$/.test(v)){ alert('Enter 7 digits'); return; }
      if(itemsBuffer.find(x=>x.num===v)) { alert('Already exists'); return; }
      itemsBuffer.push({ num:v, group:'', selected:false });
      manualNum.value=''; renderListArea();
    };

    btnAddGroup.onclick = () => {
      const g = (newGroupName.value||'').trim();
      if(!g) return;
      if(store.groups[g]) { alert('Already exists'); return; }
      store.groups[g] = { items: [] };
      refreshGroupSelect();
      newGroupName.value='';
    };

    btnBulkGroup.onclick = () => {
      const selected = itemsBuffer.filter(i=>i.selected);
      if(selected.length===0) { alert('No items selected'); return; }
      const g = prompt('Group name to assign:', '');
      if(!g) return;
      if(!store.groups[g]) store.groups[g] = { items: [] };
      selected.forEach(it => it.group = g);
      renderListArea();
    };

    btnAssignGroups.onclick = () => {
      itemsBuffer.forEach(it => {
        const g = it.group || 'Unassigned';
        if(!store.groups[g]) store.groups[g] = { items: [] };
        if(!store.groups[g].items.find(x=>x.num===it.num)) store.groups[g].items.push({ num: it.num });
      });
      itemsBuffer = [];
      renderListArea();
      saveUserStore();
      alert('Saved');
    };
  </script>
</body>
