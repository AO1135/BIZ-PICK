<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BIZ.PICK.CL</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root{--bg:#f7f8fb;--card:#fff;--primary:#0b67c2;--accent:#16a34a;--danger:#ef4444}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans JP',sans-serif;background:var(--bg);color:#111}
.wrap{max-width:920px;margin:0 auto;padding:12px 10px 120px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
h1{font-size:20px;margin:0}
.langBtn{background:#444;color:#fff;padding:8px 12px;border-radius:8px;border:none}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.muted{color:#666;font-size:13px}
input[type=file]{width:100%}
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #eee}
.num{flex:1;font-size:16px;word-break:break-all}
.qtyInput{width:90px}
input, button, select{font-size:16px}
input[type="number"], input[type="text"], select{padding:8px;border-radius:8px;border:1px solid #ddd;width:100%}
button{height:44px;border-radius:10px;border:none;padding:0 14px;cursor:pointer}
.btn-primary{background:var(--primary);color:white}
.btn-accent{background:var(--accent);color:white}
.btn-danger{background:var(--danger);color:white}
.footerInput{position:fixed;left:0;right:0;bottom:0;padding:10px;background:linear-gradient(white,transparent);display:flex;gap:8px;max-width:920px;margin:0 auto}
.footerField{flex:1}
.hidden{display:none}
.itemRow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.copyBtn{background:#eee;border:none;border-radius:6px;padding:6px 8px;cursor:pointer}
.smallBtn{padding:6px 8px;border-radius:6px;border:none;cursor:pointer;background:#ddd}
.groupTag{background:#eef; padding:4px 8px; border-radius:8px; font-size:13px}
.filterBar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:rgba(0,0,0,0.8);color:#fff;padding:8px 12px;border-radius:8px;display:none;font-size:14px;z-index:9999}
@media (max-width:640px){ .wrap{padding:10px} button{height:46px} }
</style>
</head>
<body>
<script>
const PASSWORD = "0509";
function checkPassword() {
  const userInput = prompt("🔐 パスコードを入力してください:");
  if (userInput !== PASSWORD) { alert("❌ パスワードが違います"); location.reload(); }
  else { alert("✅ ログイン成功"); }
}
window.onload = checkPassword;
</script>

<div class="wrap">
  <header>
    <h1 id="appTitle">BIZ.PICK.CL</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="langToggle" class="langBtn">English</button>
    </div>
  </header>

  <!-- USER -->
  <section id="page-user" class="card">
    <div><strong id="lblUser">ユーザー</strong></div>
    <input id="userName" type="text" placeholder="ユーザー名を入力（例：A01）" autocomplete="off">
    <div style="display:flex;gap:8px;margin-top:8px">
      <button id="btnStart" class="btn-primary" style="flex:1">Start</button>
      <button id="btnClearUser" class="btn-danger" style="width:110px">Clear</button>
    </div>
    <div class="muted" style="margin-top:10px">※ 各ユーザーはこの端末上に独立して保存されます</div>
  </section>

  <!-- REGISTRATION / OCR / LIST / GROUP-ASSIGN -->
  <section id="page-reg" class="card hidden">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <select id="groupSelect" style="flex:1"></select>
      <input id="newGroupName" type="text" placeholder="New group name">
      <button id="btnAddGroup" class="smallBtn">Add</button>
    </div>

    <div id="instr" class="muted">1) カメラで撮影または画像を選択（7桁を検出）</div>
    <input id="imgInput" type="file" accept="image/*" capture="environment">

    <div style="display:flex;gap:8px;margin-top:10px">
      <button id="btnRecognize" class="btn-primary" style="flex:1">OCR実行</button>
      <button id="btnResetDetected" class="btn-danger" style="width:110px">Reset</button>
    </div>

    <div style="margin-top:12px">
      <div class="muted">または手入力で追加</div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="manualNum" type="text" placeholder="7桁番号を入力">
        <button id="btnAddManual" class="smallBtn">追加</button>
      </div>
    </div>

    <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
      <label style="display:flex;align-items:center;gap:8px">
        <input id="preprocessToggle" type="checkbox"> 画像補正（白黒・閾値）
      </label>
      <div class="muted" style="margin-left:auto">※ 補正は多少重いです</div>
    </div>

    <hr>

    <div>
      <h3 id="listTitle">番号一覧（必要数を入力 → グループを設定）</h3>
      <div id="listArea" class="card" style="padding:10px;max-height:320px;overflow:auto"></div>

      <div style="display:flex;gap:8px;margin-top:12px">
        <button id="btnAssignGroups" class="btn-accent" style="flex:1">グループを確定して保存</button>
        <button id="btnBulkGroup" class="smallBtn">選択を一括でグループ化</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button id="btnToCheck" class="btn-accent" style="flex:1">チェック画面へ</button>
      <button id="btnLogout" class="smallBtn">Logout</button>
    </div>
  </section>

  <!-- CHECK page -->
  <section id="page-check" class="card hidden">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><strong id="checkTitle">チェック</strong><div class="muted" id="checkHint">Type 7-digit number to auto-match</div></div>
      <div><button id="btnBackToReg" class="smallBtn">← Back</button></div>
    </div>

    <div style="margin-top:12px">
      <input id="checkInput" type="text" placeholder="Enter 7-digit number" inputmode="numeric" pattern="[0-9]*">
      <div style="margin-top:8px" class="muted">Tip: 7桁を入力すると自動で判定します</div>
    </div>

    <div style="margin-top:8px; display:flex;">
      <button id="btnCheckAll" class="btn-accent" style="flex:1">一括チェック</button>
    </div>

    <div style="margin-top:12px">
      <div id="stats" class="muted"></div>
      <div class="filterBar" id="filterBar"></div>

      <h4 id="pendingLabel">Pending</h4>
      <div id="pendingArea" style="min-height:80px"></div>

      <h4 id="doneLabel" style="margin-top:12px">Checked</h4>
      <div id="doneArea"></div>
    </div>
  </section>
</div>

<div id="toast"></div>

<script>
// ----------------- 既存のコードはほぼそのまま -----------------
const PREFIX = 'BIZPICK_CL_v3_';
let currentUser = null;
let store = { groups: {} };
let itemsBuffer = [];
let lang = localStorage.getItem(PREFIX + 'lang') || 'ja';
const $ = s => document.querySelector(s);
const pageUser = $('#page-user'), pageReg = $('#page-reg'), pageCheck = $('#page-check');
const userNameInput = $('#userName'), btnStart = $('#btnStart'), btnClearUser = $('#btnClearUser');
const langToggle = $('#langToggle');
const groupSelect = $('#groupSelect'), newGroupName = $('#newGroupName'), btnAddGroup = $('#btnAddGroup');
const imgInput = $('#imgInput'), btnRecognize = $('#btnRecognize'), preprocessToggle = $('#preprocessToggle');
const btnResetDetected = $('#btnResetDetected'), manualNum = $('#manualNum'), btnAddManual = $('#btnAddManual');
const listArea = $('#listArea'), btnAssignGroups = $('#btnAssignGroups'), btnBulkGroup = $('#btnBulkGroup');
const btnToCheck = $('#btnToCheck'), btnLogout = $('#btnLogout');
const btnBackToReg = $('#btnBackToReg'), checkInput = $('#checkInput'), pendingArea = $('#pendingArea'), doneArea = $('#doneArea'), stats = $('#stats');
const filterBar = $('#filterBar'), toast = $('#toast');
const instr = $('#instr'), detHeader = $('#detHeader'), listTitle = $('#listTitle');
const btnCheckAll = $('#btnCheckAll');

// --- helper ---
function showToast(msg, ms=900){ toast.textContent = msg; toast.style.display='block'; setTimeout(()=>toast.style.display='none', ms); }
function saveUserStore(){ if(!currentUser) return; localStorage.setItem(PREFIX + currentUser, JSON.stringify(store)); localStorage.setItem(PREFIX + 'lang', lang); }
function loadUserStore(user){ const raw = localStorage.getItem(PREFIX + user); if(raw){ try{ store = JSON.parse(raw); } catch(e){ store = { groups: {} }; } } else { store = { groups: {} }; } }
function existsAny(num){ for(const g in store.groups){ if((store.groups[g].items||[]).find(i=>i.num===num)) return true; } return false; }
function copyText(txt){ if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).catch(()=>prompt('Copy:', txt)); else prompt('Copy:', txt); }

let currentFilter = 'All';

// ---- render pending/done ----
function renderPendingDone(filterGroup='All'){
  pendingArea.innerHTML = ''; doneArea.innerHTML = ''; stats.textContent = ''; filterBar.innerHTML='';
  const groupNames = ['All', ...Object.keys(store.groups || {})];
  groupNames.forEach(g => {
    const b = document.createElement('button'); b.className='smallBtn'; b.textContent = g;
    b.onclick = ()=> { currentFilter = g; renderPendingDone(g); };
    filterBar.appendChild(b);
  });
  const agg = [];
  for(const g in store.groups){
    for(const it of (store.groups[g].items || [])){
      if(filterGroup !== 'All' && filterGroup !== g) continue;
      const rem = (it.qty||0) - (it.done||0);
      agg.push({ num: it.num, qty: it.qty, done: it.done||0, rem, group: g, ref: it });
    }
  }
  agg.sort((a,b)=> a.num.localeCompare(b.num));
  let pendingCount=0, pendingQty=0, doneCount=0, doneQty=0;
  agg.forEach(a=>{
    if(a.rem > 0){
      pendingCount++; pendingQty += a.rem;
      const row = document.createElement('div'); row.className='itemRow';
      const left = document.createElement('div'); left.textContent = `${a.num} (${a.group})`; left.style.cursor='pointer';
      left.onclick = ()=> { copyText(a.num); showToast('Copied'); };
      const right = document.createElement('div'); right.style.display='flex'; right.style.gap='8px'; right.style.alignItems='center';
      const remDiv = document.createElement('div'); remDiv.textContent = a.rem; remDiv.style.minWidth='40px';
      const quick = document.createElement('button'); quick.className='smallBtn'; quick.textContent='-1';
      quick.onclick = ()=> doCheckNumber(a.num,1);
      right.appendChild(remDiv); right.appendChild(quick);
      row.appendChild(left); row.appendChild(right);
      pendingArea.appendChild(row);
    } else {
      doneCount++; doneQty += a.done;
      const row = document.createElement('div'); row.className='itemRow';
      const left = document.createElement('div'); left.textContent = `${a.num} ✔ ${a.done}/${a.qty}`; left.style.color='green'; left.style.cursor='pointer';
      left.onclick = ()=> { copyText(a.num); showToast('Copied'); };
      const undo = document.createElement('button'); undo.className='smallBtn'; undo.textContent='↩戻す';
      undo.onclick = ()=> { a.ref.done = 0; saveUserStore(); renderPendingDone(filterGroup); };
      row.appendChild(left); row.appendChild(undo);
      doneArea.appendChild(row);
    }
  });
  stats.textContent = `Pending: ${pendingCount} (${pendingQty})  ／  Done: ${doneCount} (${doneQty})`;
}

// ---- find item ----
function findItemAcross(num){ for(const g in store.groups){ const it = (store.groups[g].items||[]).find(x=>x.num===num); if(it) return { group:g, item: it }; } return null; }

// ---- check logic ----
function doCheckNumber(num, quickQty=null){
  const found = findItemAcross(num); if(!found) return;
  const it = found.item;
  const rem = (it.qty||0) - (it.done||0);
  if(rem <= 0){ showToast('Already done'); return; }
  const useQty = quickQty !== null ? Math.min(quickQty, rem) : rem;
  it.done += useQty;
  saveUserStore(); renderPendingDone(currentFilter);
}

// ---- auto-match input ----
checkInput.addEventListener('input', (e)=>{
  const v = (e.target.value||'').trim();
  if(/^\d{7}$/.test(v)){ doCheckNumber(v); e.target.value=''; }
});

// ---- check all button ----
btnCheckAll.addEventListener('click', ()=>{
  if(!confirm('このグループ内の全アイテムをチェック済みにしますか？')) return;
  for(const g in store.groups){
    if(currentFilter !== 'All' && g !== currentFilter) continue;
    store.groups[g].items.forEach(it => it.done = it.qty);
  }
  saveUserStore(); renderPendingDone(currentFilter); showToast('All items checked');
});

// ---- navigation buttons ----
$('#btnToCheck').addEventListener('click', ()=>{ saveUserStore(); currentFilter='All'; renderPendingDone('All'); showPage('check'); });
$('#btnBackToReg').addEventListener('click', ()=>{ showPage('reg'); });
$('#btnLogout').addEventListener('click', ()=>{ currentUser=null; store={groups:{}}; itemsBuffer=[]; showPage('user'); });

// ---- page control ----
function showPage(p){
  pageUser.classList.add('hidden'); pageReg.classList.add('hidden'); pageCheck.classList.add('hidden');
  if(p==='user') pageUser.classList.remove('hidden');
  if(p==='reg') pageReg.classList.remove('hidden');
  if(p==='check') pageCheck.classList.remove('hidden');
}

// ---- user login ----
btnStart.addEventListener('click', ()=>{
  const name = userNameInput.value.trim(); if(!name){ alert('Enter user name'); return; }
  currentUser = name; loadUserStore(currentUser); showPage('reg'); showToast('Welcome '+currentUser);
});
btnClearUser.addEventListener('click', ()=>{ if(confirm('Clear local data for this user?')){ localStorage.removeItem(PREFIX+userNameInput.value); showToast('Cleared'); }});

// ---- language toggle ----
langToggle.addEventListener('click', ()=>{ lang = (lang==='ja'?'en':'ja'); localStorage.setItem(PREFIX+'lang', lang); showToast('Lang: '+lang); });
</script>
</body>
</html>
