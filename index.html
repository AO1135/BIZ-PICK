<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BIZ.PICK.CL</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root{--bg:#f7f8fb;--card:#fff;--primary:#0b67c2;--accent:#16a34a;--danger:#ef4444}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans JP',sans-serif;background:var(--bg);color:#111}
.wrap{max-width:920px;margin:0 auto;padding:12px 10px 120px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
h1{font-size:20px;margin:0}
.langBtn{background:#444;color:#fff;padding:8px 12px;border-radius:8px;border:none}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.muted{color:#666;font-size:13px}
input[type=file]{width:100%}
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #eee}
.num{flex:1;font-size:16px;word-break:break-all}
.qtyInput{width:90px}
input, button, select{font-size:16px}
input[type="number"], input[type="text"], select{padding:8px;border-radius:8px;border:1px solid #ddd;width:100%}
button{height:44px;border-radius:10px;border:none;padding:0 14px;cursor:pointer}
.btn-primary{background:var(--primary);color:white}
.btn-accent{background:var(--accent);color:white}
.btn-danger{background:var(--danger);color:white}
.footerInput{position:fixed;left:0;right:0;bottom:0;padding:10px;background:linear-gradient(white,transparent);display:flex;gap:8px;max-width:920px;margin:0 auto}
.footerField{flex:1}
.hidden{display:none}
.itemRow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.copyBtn{background:#eee;border:none;border-radius:6px;padding:6px 8px;cursor:pointer}
.smallBtn{padding:6px 8px;border-radius:6px;border:none;cursor:pointer;background:#ddd}
.groupTag{background:#eef; padding:4px 8px; border-radius:8px; font-size:13px}
.filterBar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:rgba(0,0,0,0.8);color:#fff;padding:8px 12px;border-radius:8px;display:none;font-size:14px;z-index:9999}
@media (max-width:640px){ .wrap{padding:10px} button{height:46px} }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1 id="appTitle">BIZ.PICK.CL</h1>
  </header>

  <!-- USER LOGIN -->
  <section id="page-user" class="card">
    <div><strong id="lblUser">ユーザー</strong></div>
    <input id="userName" type="text" placeholder="ユーザー名を入力（例：A01）" autocomplete="off">
    <div style="display:flex;gap:8px;margin-top:8px">
      <button id="btnStart" class="btn-primary" style="flex:1">Start</button>
      <button id="btnClearUser" class="btn-danger" style="width:110px">Clear</button>
    </div>
    <div class="muted" style="margin-top:10px">※ 各ユーザーはこの端末上に独立して保存されます</div>
  </section>

  <!-- REGISTRATION / OCR / LIST / GROUP-ASSIGN -->
  <section id="page-reg" class="card hidden">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <select id="groupSelect" style="flex:1"></select>
      <input id="newGroupName" type="text" placeholder="New group name">
      <button id="btnAddGroup" class="smallBtn">Add</button>
    </div>

    <div id="instr" class="muted">1) カメラで撮影または画像を選択（7桁を検出）</div>
    <input id="imgInput" type="file" accept="image/*" capture="environment">

    <div style="display:flex;gap:8px;margin-top:10px">
      <button id="btnRecognize" class="btn-primary" style="flex:1">OCR実行</button>
      <button id="btnResetDetected" class="btn-danger" style="width:110px">Reset</button>
    </div>

    <div style="margin-top:12px">
      <div class="muted">または手入力で追加</div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="manualNum" type="text" placeholder="7桁番号を入力">
        <button id="btnAddManual" class="smallBtn">追加</button>
      </div>
    </div>

    <hr>

    <div>
      <h3 id="listTitle">番号一覧（必要数を入力 → グループを設定）</h3>
      <div id="listArea" class="card" style="padding:10px;max-height:320px;overflow:auto"></div>

      <div style="display:flex;gap:8px;margin-top:12px">
        <button id="btnAssignGroups" class="btn-accent" style="flex:1">グループを確定して保存</button>
        <button id="btnBulkGroup" class="smallBtn">選択を一括でグループ化</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button id="btnToCheck" class="btn-accent" style="flex:1">チェック画面へ</button>
      <button id="btnLogout" class="smallBtn">Logout</button>
    </div>
  </section>

  <!-- CHECK page -->
  <section id="page-check" class="card hidden">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><strong id="checkTitle">チェック</strong></div>
      <div><button id="btnBackToReg" class="smallBtn">← Back</button></div>
    </div>

    <div style="margin-top:12px">
      <input id="checkInput" type="text" placeholder="Enter 7-digit number" inputmode="numeric" pattern="[0-9]*">
      <div style="margin-top:8px" class="muted">Tip: 7桁を入力すると自動で判定します</div>
    </div>

    <div style="margin-top:12px">
      <div id="stats" class="muted"></div>
      <div class="filterBar" id="filterBar"></div>

      <h4 id="pendingLabel">Pending</h4>
      <div id="pendingArea" style="min-height:80px"></div>

      <h4 id="doneLabel" style="margin-top:12px">Checked</h4>
      <div id="doneArea"></div>
    </div>
  </section>
</div>

<div id="toast"></div>

<script>
// ==== パスワード認証 ====
const PASSWORD = "0509";
function checkPassword(){
  const userInput = prompt("🔐 パスコードを入力してください:");
  if(userInput !== PASSWORD){ alert("❌ パスワードが違います"); location.reload(); }
  else { alert("✅ ログイン成功"); }
}
window.onload = checkPassword;

// ==== BIZ.PICK.CL 完全版（個数対応）====
const PREFIX = 'BIZPICK_CL_v5_';
let currentUser=null, store={groups:{},items:[]}, itemsBuffer=[];

// ---- DOM
const $ = s=>document.querySelector(s);
const pageUser = $('#page-user'), pageReg = $('#page-reg'), pageCheck = $('#page-check');
const userNameInput = $('#userName'), btnStart = $('#btnStart'), btnClearUser =$('#btnClearUser');
const groupSelect = $('#groupSelect'), newGroupName = $('#newGroupName'), btnAddGroup = $('#btnAddGroup');
const imgInput = $('#imgInput'), btnRecognize = $('#btnRecognize');
const btnResetDetected = $('#btnResetDetected'), manualNum = $('#manualNum'), btnAddManual = $('#btnAddManual');
const listArea = $('#listArea'), btnAssignGroups = $('#btnAssignGroups'), btnBulkGroup = $('#btnBulkGroup');
const btnToCheck = $('#btnToCheck'), btnLogout = $('#btnLogout');
const btnBackToReg = $('#btnBackToReg'), checkInput = $('#checkInput');
const pendingArea = $('#pendingArea'), doneArea = $('#doneArea'), stats = $('#stats');
const toast = $('#toast');

// ---- toast
function toastMsg(msg,t=1500){ toast.innerText=msg; toast.style.display='block'; setTimeout(()=>toast.style.display='none',t); }

// ---- storage
function saveUserStore(){ if(currentUser) localStorage.setItem(PREFIX+currentUser,JSON.stringify(store)); }
function loadUserStore(user){ currentUser=user; let data=localStorage.getItem(PREFIX+user); if(data) store=JSON.parse(data); else store={groups:{},items:[]}; }

// ==== ユーザー操作 ====
btnStart.onclick=()=>{
  const name=userNameInput.value.trim(); if(!name){ toastMsg('ユーザー名を入力'); return; }
  loadUserStore(name);
  pageUser.classList.add('hidden'); pageReg.classList.remove('hidden');
  refreshGroupSelect(); refreshListArea();
};
btnClearUser.onclick=()=>{ userNameInput.value=''; currentUser=null; };

// ==== グループ管理 ====
function refreshGroupSelect(){
  groupSelect.innerHTML='';
  Object.keys(store.groups).forEach(g=>{
    let o=document.createElement('option');
    o.value=g; o.innerText=g;
    groupSelect.appendChild(o);
  });
}
btnAddGroup.onclick=()=>{
  let n=newGroupName.value.trim();
  if(!n) return;
  if(!store.groups[n]) store.groups[n]=[];
  newGroupName.value=''; refreshGroupSelect(); saveUserStore();
};

// ==== OCR ====
btnRecognize.onclick=async()=>{
  if(!imgInput.files.length){ toastMsg('画像を選択してください'); return; }
  const file=imgInput.files[0];
  const reader=new FileReader();
  reader.onload=async(e)=>{
    let imgData=e.target.result;
    const res=await Tesseract.recognize(imgData,'eng',{logger:m=>{}});
    let txt=res.data.text.replace(/[^\d]/g,' ');
    let nums=(txt.match(/\b\d{7}\b/g)||[]);
    nums.forEach(n=>{
      if(!store.items.find(i=>i.num===n)){
        store.items.push({num:n,group:null,done:false,qty:0});
      }
    });
    refreshListArea(); saveUserStore(); toastMsg('OCR完了');
  };
  reader.readAsDataURL(file);
};

// ==== 手動追加 ====
btnAddManual.onclick=()=>{
  const n=manualNum.value.trim();
  if(!/^\d{7}$/.test(n)){ toastMsg('7桁番号を入力'); return; }
  if(store.items.find(i=>i.num===n)){ toastMsg('重複番号'); return; }
  store.items.push({num:n,group:null,done:false,qty:0});
  manualNum.value=''; refreshListArea(); saveUserStore();
};
btnResetDetected.onclick=()=>{ store.items=[]; refreshListArea(); saveUserStore(); };

// ==== リスト表示（個数入力付き）====
function refreshListArea(){
  listArea.innerHTML='';
  store.items.forEach((i,idx)=>{
    const row=document.createElement('div'); row.className='itemRow';

    const chk=document.createElement('input'); chk.type='checkbox'; chk.dataset.idx=idx;
    row.appendChild(chk);

    const span=document.createElement('span'); span.className='num'; span.innerText=i.num;
    row.appendChild(span);

    const grp=document.createElement('span'); grp.className='groupTag'; grp.innerText=i.group||'-';
    row.appendChild(grp);

    const qty=document.createElement('input');
    qty.type='number';
    qty.min='0';
    qty.value=i.qty || '';
    qty.className='qtyInput';
    qty.onchange=()=>{ store.items[idx].qty=parseInt(qty.value)||0; saveUserStore(); };
    row.appendChild(qty);

    listArea.appendChild(row);
  });
}

// ==== 一括グループ割り当て ====
btnBulkGroup.onclick=()=>{
  const sel=groupSelect.value;
  if(!sel){ toastMsg('グループ選択'); return; }
  listArea.querySelectorAll('input[type=checkbox]').forEach(chk=>{
    if(chk.checked){
      store.items[chk.dataset.idx].group=sel;
      chk.checked=false;
    }
  });
  refreshListArea(); saveUserStore();
};

// ==== グループ確定 ====
btnAssignGroups.onclick=()=>{ saveUserStore(); toastMsg('保存しました'); };

// ==== チェック画面 ====
btnToCheck.onclick=()=>{ pageReg.classList.add('hidden'); pageCheck.classList.remove('hidden'); refreshCheckArea(); };
btnBackToReg.onclick=()=>{ pageCheck.classList.add('hidden'); pageReg.classList.remove('hidden'); };

// チェック入力
checkInput.oninput=()=>{
  const val=checkInput.value.trim();
  if(val.length!==7) return;
  let it=store.items.find(i=>i.num===val);
  if(it && !it.done){ it.done=true; refreshCheckArea(); saveUserStore(); }
  checkInput.value='';
};

// チェックエリア表示（個数表示付き）
function refreshCheckArea(){
  pendingArea.innerHTML=''; doneArea.innerHTML='';
  let p=0,d=0;
  store.items.forEach(i=>{
    const div=document.createElement('div'); div.className='itemRow';
    const span=document.createElement('span'); span.className='num'; span.innerText=i.num;
    div.appendChild(span);

    const grp=document.createElement('span'); grp.className='groupTag'; grp.innerText=i.group||'-';
    div.appendChild(grp);

    const qty=document.createElement('span'); qty.className='groupTag'; qty.innerText='Qty: ' + (i.qty || 0);
    div.appendChild(qty);

    if(i.done){ doneArea.appendChild(div); d++; } else { pendingArea.appendChild(div); p++; }
  });
  stats.innerText=`Pending: ${p}, Checked: ${d}`;
}

// ==== Logout ====
btnLogout.onclick=()=>{ currentUser=null; pageReg.classList.add('hidden'); pageUser.classList.remove('hidden'); };
</script>
</body>
</html>
