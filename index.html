<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BIZ.PICK.CL</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root{--bg:#f7f8fb;--card:#fff;--primary:#0b67c2;--accent:#16a34a;--danger:#ef4444}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans JP',sans-serif;background:var(--bg);color:#111}
.wrap{max-width:920px;margin:0 auto;padding:12px 10px 120px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
h1{font-size:20px;margin:0}
.langBtn{background:#444;color:#fff;padding:8px 12px;border-radius:8px;border:none}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.muted{color:#666;font-size:13px}
input[type=file]{width:100%}
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #eee}
.num{flex:1;font-size:16px;word-break:break-all}
.qtyInput{width:90px}
input, button, select{font-size:16px}
input[type="number"], input[type="text"], select{padding:8px;border-radius:8px;border:1px solid #ddd;width:100%}
button{height:44px;border-radius:10px;border:none;padding:0 14px;cursor:pointer}
.btn-primary{background:var(--primary);color:white}
.btn-accent{background:var(--accent);color:white}
.btn-danger{background:var(--danger);color:white}
.footerInput{position:fixed;left:0;right:0;bottom:0;padding:10px;background:linear-gradient(white,transparent);display:flex;gap:8px;max-width:920px;margin:0 auto}
.footerField{flex:1}
.hidden{display:none}
.itemRow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.copyBtn{background:#eee;border:none;border-radius:6px;padding:6px 8px;cursor:pointer}
.smallBtn{padding:6px 8px;border-radius:6px;border:none;cursor:pointer;background:#ddd}
.groupTag{background:#eef; padding:4px 8px; border-radius:8px; font-size:13px}
.filterBar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:rgba(0,0,0,0.8);color:#fff;padding:8px 12px;border-radius:8px;display:none;font-size:14px;z-index:9999}
@media (max-width:640px){ .wrap{padding:10px} button{height:46px} }
</style>
</head>
<body>

<script>
/* ==== パスワード認証 ==== */
const PASSWORD = "0509";
function checkPassword() {
  const userInput = prompt("🔐 パスコードを入力してください:");
  if (userInput !== PASSWORD) {
    alert("❌ パスワードが違います");
    location.reload();
  }
}
window.onload = checkPassword;
</script>

<div class="wrap">

<header>
  <h1 id="appTitle">BIZ.PICK.CL</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="langToggle" class="langBtn">English</button>
  </div>
</header>

<!-- ユーザー入力 -->
<section id="page-user" class="card">
  <div><strong id="lblUser">ユーザー</strong></div>
  <input id="userName" type="text" placeholder="ユーザー名を入力（例：A01）" autocomplete="off">
  <div style="display:flex;gap:8px;margin-top:8px">
    <button id="btnStart" class="btn-primary" style="flex:1">Start</button>
    <button id="btnClearUser" class="btn-danger" style="width:110px">Clear</button>
  </div>
  <div class="muted" style="margin-top:10px">※ 各ユーザーはこの端末上に独立して保存されます</div>
</section>

<!-- OCR / 登録 / グループ -->
<section id="page-reg" class="card hidden">
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
    <select id="groupSelect" style="flex:1"></select>
    <input id="newGroupName" type="text" placeholder="New group name">
    <button id="btnAddGroup" class="smallBtn">Add</button>
  </div>

  <div id="instr" class="muted">1) カメラで撮影または画像を選択（7桁を検出）</div>
  <input id="imgInput" type="file" accept="image/*" capture="environment">

  <div style="display:flex;gap:8px;margin-top:10px">
    <button id="btnRecognize" class="btn-primary" style="flex:1">OCR実行</button>
    <button id="btnResetDetected" class="btn-danger" style="width:110px">Reset</button>
  </div>

  <div style="margin-top:12px">
    <div class="muted">または手入力で追加</div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <input id="manualNum" type="text" placeholder="7桁番号を入力">
      <button id="btnAddManual" class="smallBtn">追加</button>
    </div>
  </div>

  <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
    <label style="display:flex;align-items:center;gap:8px">
      <input id="preprocessToggle" type="checkbox"> 画像補正（白黒・閾値）
    </label>
    <div class="muted" style="margin-left:auto">※ 補正は多少重いです</div>
  </div>

  <hr>

  <div>
    <h3 id="listTitle">番号一覧（必要数を入力 → グループを設定）</h3>
    <div id="listArea" class="card" style="padding:10px;max-height:320px;overflow:auto"></div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button id="btnAssignGroups" class="btn-accent" style="flex:1">グループを確定して保存</button>
      <button id="btnBulkGroup" class="smallBtn">選択を一括でグループ化</button>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-top:12px">
    <button id="btnToCheck" class="btn-accent" style="flex:1">チェック画面へ</button>
    <button id="btnLogout" class="smallBtn">Logout</button>
  </div>
</section>

<!-- チェック画面 -->
<section id="page-check" class="card hidden">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div><strong id="checkTitle">チェック</strong><div class="muted" id="checkHint">Type 7-digit number to auto-match</div></div>
    <div><button id="btnBackToReg" class="smallBtn">← Back</button></div>
  </div>

  <div style="margin-top:12px">
    <input id="checkInput" type="text" placeholder="Enter 7-digit number" inputmode="numeric" pattern="[0-9]*">
    <div style="margin-top:8px" class="muted">Tip: 7桁を入力すると自動で判定します</div>
  </div>

  <div style="margin-top:12px">
    <div id="stats" class="muted"></div>
    <div class="filterBar" id="filterBar"></div>

    <h4 id="pendingLabel">Pending</h4>
    <div id="pendingArea" style="min-height:80px"></div>

    <h4 id="doneLabel" style="margin-top:12px">Checked</h4>
    <div id="doneArea"></div>
  </div>
</section>

</div>

<div id="toast"></div>

<script>
// ==== ここから下は前回のOCR/グループ/チェック処理スクリプト ====
/* 全コードは先ほどまでのBIZ.PICK.CL完全版のスクリプトをそのまま統合 */

const $ = s => document.querySelector(s);
const pageUser = $('#page-user'), pageReg = $('#page-reg'), pageCheck = $('#page-check');
const userNameInput = $('#userName'), btnStart = $('#btnStart'), btnClearUser = $('#btnClearUser');
const langToggle = $('#langToggle');
const groupSelect = $('#groupSelect'), newGroupName = $('#newGroupName'), btnAddGroup = $('#btnAddGroup');
const imgInput = $('#imgInput'), btnRecognize = $('#btnRecognize'), preprocessToggle = $('#preprocessToggle');
const btnResetDetected = $('#btnResetDetected'), manualNum = $('#manualNum'), btnAddManual = $('#btnAddManual');
const listArea = $('#listArea'), btnAssignGroups = $('#btnAssignGroups'), btnBulkGroup = $('#btnBulkGroup');
const btnToCheck = $('#btnToCheck'), btnLogout = $('#btnLogout');
const btnBackToReg = $('#btnBackToReg'), checkInput = $('#checkInput'), pendingArea = $('#pendingArea'), doneArea = $('#doneArea'), stats = $('#stats');
const filterBar = $('#filterBar'), toast = $('#toast');
const instr = $('#instr'), detHeader = $('#detHeader'), listTitle = $('#listTitle');

</body>
</html>
